<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gorras PB</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #111; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Playfair Display', serif; color: #fff; font-size: 22px; letter-spacing: 3px; }
        .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 40px; width: 100%; max-width: 340px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .login-title { font-family: 'Playfair Display', serif; color: #111; font-size: 26px; text-align: center; margin-bottom: 6px; }
        .login-sub { color: #999; font-size: 13px; text-align: center; margin-bottom: 28px; }
        .divider { width: 50px; height: 2px; background: #111; margin: 0 auto 24px; }
        label { font-size: 12px; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 11px 14px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; color: #111; font-size: 14px; margin-bottom: 16px; font-family: 'Poppins', sans-serif; }
        input:focus { outline: none; border-color: #111; }
        button { width: 100%; padding: 13px; background: #111; color: #fff; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 14px; font-family: 'Poppins', sans-serif; letter-spacing: 1px; }
        button:hover { background: #333; }
        .mensaje { color: #c00; text-align: center; margin-top: 14px; font-size: 13px; }
        footer { text-align: center; padding: 20px; color: #aaa; font-size: 12px; border-top: 1px solid #e0e0e0; background: #fff; }
    </style>
</head>
<body>
    <header>
        <div class="logo">GORRAS PB</div>
    </header>
    <div class="login-wrap">
        <div class="login-card">
            <p class="login-title">Bienvenido</p>
            <div class="divider"></div>
            <p class="login-sub">Inicia sesión para continuar</p>
            <form method="POST">
                <label>Usuario</label>
                <input type="text" name="usuario" placeholder="Tu usuario" required>
                <label>Contraseña</label>
                <input type="password" name="contraseña" placeholder="Tu contraseña" required>
                <button type="submit">INICIAR SESIÓN</button>
            </form>
            <p class="mensaje">{{ mensaje }}</p>
        </div>
    </div>
    <footer>© 2026 Gorras PB — Todos los derechos reservados</footer>
</body>
</html>
